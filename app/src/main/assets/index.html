<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>YTDow</title>
<style>
:root{--bg:#121212;--card:#1E1E1E;--input:#2C2C2C;--accent:#1E88E5;--accent2:#1565C0;--t1:#fff;--t2:#B0B0B0;--t3:#757575;--r:20px;--rm:14px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,'Helvetica Neue',sans-serif;min-height:100vh;padding-bottom:80px;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ── Header ── */
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;position:sticky;top:0;background:rgba(18,18,18,.85);backdrop-filter:blur(10px);z-index:10}
.header-title{font-weight:700;font-size:20px}
.header-ver{font-size:12px;color:var(--t3)}

/* ── Pages ── */
.page{padding:0 20px;display:none}
.page.active{display:block}

/* ── Input ── */
.input-wrap{background:var(--input);border-radius:var(--rm);padding:12px 16px;display:flex;align-items:center;gap:12px;border:1px solid transparent;transition:.2s}
.input-wrap:focus-within{border-color:var(--accent);background:#333}
.input-wrap span{color:var(--t3);flex-shrink:0}
.input-wrap input{background:transparent;border:none;outline:none;color:var(--t1);width:100%;font-size:16px;font-family:inherit}
.input-wrap input::placeholder{color:var(--t3)}
.history-wrap{position:relative;margin-bottom:4px}
.history-list{display:none;position:absolute;top:100%;left:0;right:0;background:var(--input);border:1px solid #333;border-radius:10px;z-index:10;max-height:200px;overflow-y:auto;margin-top:2px}
.history-list.show{display:block}
.history-item{padding:12px 16px;font-size:13px;color:var(--t2);cursor:pointer;border-bottom:1px solid #333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item:last-child{border-bottom:none}
.history-item:active{background:#333;color:var(--t1)}

/* ── Pills ── */
.options-row{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.pill{background:var(--card);border:1px solid #333;border-radius:50px;padding:8px 14px;color:var(--t1);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
.pill:active{transform:scale(.96)}
.pill span{color:var(--t2);font-weight:400}
.pill.folder{padding:8px 10px}
.size-trigger{background:transparent;border:none;color:var(--t2);font-size:13px;cursor:pointer;padding:6px 10px;border-radius:20px;transition:.2s;display:flex;align-items:center;gap:4px;margin-left:auto}
.size-trigger:active{background:var(--input);color:var(--t1)}
.size-trigger svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
#sizeStatus{font-size:12px;color:var(--t2);margin:4px 0 0 4px;min-height:18px}

/* ── Download btn ── */
.dl-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--rm);padding:16px;font-size:17px;font-weight:600;margin-top:18px;cursor:pointer;transition:.2s;box-shadow:0 4px 12px rgba(30,136,229,.3)}
.dl-btn:active{transform:scale(.98);background:var(--accent2)}

/* ── Task cards ── */
.task-card{background:var(--card);border-radius:var(--rm);padding:16px;margin-bottom:12px;border:1px solid #2a2a2a;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.task-header{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.task-icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-icon-wrap.video{background:linear-gradient(135deg,#1E88E5,#1565C0);border-radius:10px}
.task-icon-wrap.audio{background:linear-gradient(135deg,#7C4DFF,#651FFF);border-radius:50%}
.task-icon-wrap svg{width:22px;height:22px;fill:#fff}
.task-info{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
.task-title{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-meta{font-size:12px;color:var(--t2)}
.task-status-row{display:flex;justify-content:space-between;font-size:13px;font-weight:500;margin-bottom:6px}
.task-status-row .pct{color:var(--t1)}
.task-status-row .eta{color:var(--t3)}
.track{height:6px;background:#333;border-radius:3px;width:100%;overflow:hidden;margin-bottom:12px}
.fill{height:100%;background:linear-gradient(90deg,var(--accent) 0%,#4fc3f7 50%,var(--accent) 100%);background-size:200% 100%;border-radius:3px;animation:shimmer 1.5s infinite linear}
.fill.indeterminate{width:100%!important;animation:indeterminate 1.5s ease-in-out infinite;background:var(--accent);background-size:auto}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes indeterminate{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.task-actions{display:flex;justify-content:flex-end;gap:10px;border-top:1px solid #2a2a2a;padding-top:10px}
.task-actions .act{background:transparent;border:none;color:var(--t2);padding:8px;border-radius:8px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px;font-size:13px}
.task-actions .act:active{background:#333;color:var(--t1)}
.task-status-done{color:#4caf50;font-size:13px;font-weight:500}
.task-error{color:#ef5350;font-size:13px}
.task-cancelled{color:#ff9f0a;font-size:13px}
.cancel-circle{width:38px;height:38px;border-radius:50%;border:1px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.2s}
.cancel-circle:active{transform:scale(.9);background:#2a2a2a}
.cancel-circle svg{width:16px;height:16px;stroke:#ef5350;stroke-width:2.5;fill:none;stroke-linecap:round}

/* ── Library ── */
.lib-item{background:var(--card);border-radius:var(--rm);padding:16px;margin-bottom:12px;border:1px solid #2a2a2a;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.lib-item .lib-header{display:flex;gap:12px;align-items:flex-start}
.lib-thumb{width:52px;height:52px;background:#252525;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#555;font-size:20px;flex-shrink:0}
.lib-info{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.lib-title{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lib-meta{font-size:12px;color:var(--t2);display:flex;gap:8px;align-items:center}
.lib-actions{display:flex;justify-content:flex-end;gap:10px;border-top:1px solid #2a2a2a;margin-top:10px;padding-top:10px}
.lib-actions .act{background:transparent;border:none;color:var(--t2);padding:8px;border-radius:8px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px;font-size:13px}
.lib-actions .act:active{background:#333;color:var(--t1)}

/* ── Settings ── */
.settings-card{background:var(--card);border-radius:var(--rm);padding:14px;margin-bottom:8px;border:1px solid #2a2a2a}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px}
.settings-row+.settings-row{border-top:1px solid #2a2a2a}
.settings-row .val{font-size:12px;color:var(--t3);max-width:180px;overflow:hidden;text-overflow:ellipsis}

/* ── Update ── */
.update-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--rm);padding:14px;font-size:14px;font-weight:600;margin-top:12px;cursor:pointer}
.update-btn:active{background:var(--accent2)}
#updateStatus{font-size:12px;color:var(--t2);text-align:center;margin-top:8px}
.version-info{font-size:11px;color:#4a4a4a;text-align:center;margin-top:16px}

/* ── Bottom sheets ── */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:100;display:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(4px)}
.overlay.show{display:block;opacity:1}
.sheet{position:fixed;bottom:-100%;left:0;width:100%;background:#1E1E1E;border-radius:20px 20px 0 0;z-index:101;padding:20px 24px 30px;transition:bottom .35s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 30px rgba(0,0,0,.8);max-height:70vh;overflow-y:auto}
.sheet.show{bottom:0}
.sheet-handle{width:40px;height:4px;background:#444;border-radius:4px;margin:0 auto 18px}
.sheet-title{font-size:18px;font-weight:600;margin-bottom:16px}
.sheet-opt{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #2a2a2a;cursor:pointer}
.sheet-opt:last-child{border-bottom:none}
.sheet-opt .left{display:flex;align-items:center;gap:14px}
.icon-box{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-box.vid{background:#000;border-radius:8px}
.icon-box.aud{background:#000;border-radius:50%}
.icon-box svg{width:20px;height:20px;fill:#fff}
.sheet-opt .txt{display:flex;flex-direction:column;gap:2px}
.sheet-opt .main{font-size:15px;font-weight:500}
.sheet-opt .sub{font-size:12px;color:var(--t2)}
.radio{width:22px;height:22px;border-radius:50%;border:2px solid #555;display:flex;align-items:center;justify-content:center;transition:.2s}
.sheet-opt.sel .radio{border-color:var(--accent)}
.sheet-opt.sel .radio::after{content:'';width:12px;height:12px;background:var(--accent);border-radius:50%}
.sheet-opt.sel .main{color:var(--t1)}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:#1A1A1A;border-top:1px solid #2a2a2a;display:flex;justify-content:space-around;padding:10px 0 20px;z-index:20}
.tab-btn{background:transparent;border:none;color:var(--t3);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-size:10px;transition:.3s;padding:4px 20px}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.empty{text-align:center;color:var(--t3);padding:40px 0;font-size:13px}
h2{font-size:15px;color:var(--t2);margin:16px 0 8px;font-weight:500;cursor:pointer}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header"><span class="header-title">Загрузчик</span><button class="settings-btn" onclick="openSheet('settings')" style="background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:4px">⚙️</button></div>

<!-- ═══ ГЛАВНАЯ ═══ -->
<div class="page active" id="pageHome">

  <div class="history-wrap">
    <div class="input-wrap"><span>🔗</span><input type="url" id="urlInput" placeholder="Вставьте ссылки через запятую..." autocomplete="off" autocorrect="off" autocapitalize="none" enterkeyhint="go"></div>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="options-row">
    <button class="pill" onclick="openSheet('format')"><span>Формат:</span><b id="format-text">MP4</b></button>
    <button class="pill" onclick="openSheet('quality')"><span>Качество:</span><b id="quality-text">Лучшее</b></button>
    <button class="pill folder" onclick="changePath()">📁</button>
    <button class="size-trigger" onclick="checkSize()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>
      <span id="sizeText">Узнать размер</span>
    </button>
  </div>

  <button class="dl-btn" onclick="startDownload()">⬇ Скачать</button>

  <h2>Загрузки</h2>
  <div id="taskList"><div class="empty">Нет активных загрузок</div></div>
</div>

<!-- ═══ БИБЛИОТЕКА ═══ -->
<div class="page" id="pageLibrary">
  <h2 onclick="toggleSection('libraryDownloads')">📥 Скачанное <span id="libArrow" style="font-size:10px">▼</span></h2>
  <div id="libraryDownloads"><div class="empty">Пусто</div></div>
</div>

<!-- ═══ BOTTOM SHEETS ═══ -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<div class="sheet" id="sheet-format">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Выберите формат</div>
  <div class="sheet-opt sel" onclick="pickFormat('mp4','MP4',this)"><div class="left"><div class="icon-box vid"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></div><div class="txt"><span class="main">MP4</span><span class="sub">Видео</span></div></div><div class="radio"></div></div>
  <div class="sheet-opt" onclick="pickFormat('mp3','MP3',this)"><div class="left"><div class="icon-box aud"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg></div><div class="txt"><span class="main">MP3</span><span class="sub">Аудио</span></div></div><div class="radio"></div></div>
</div>

<div class="sheet" id="sheet-quality">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Выберите качество</div>
  <div class="sheet-opt sel" onclick="pickQuality('best','Лучшее',this)"><div class="left"><span style="color:var(--accent);font-weight:700;margin-right:4px">✓</span>Лучшее (Best)</div><div class="radio"></div></div>
  <div class="sheet-opt" onclick="pickQuality('2160p','2160p',this)"><div class="left">2160p (4K)</div><div class="radio"></div></div>
  <div class="sheet-opt" onclick="pickQuality('1440p','1440p',this)"><div class="left">1440p</div><div class="radio"></div></div>
  <div class="sheet-opt" onclick="pickQuality('1080p','1080p',this)"><div class="left">1080p (Full HD)</div><div class="radio"></div></div>
  <div class="sheet-opt" onclick="pickQuality('720p','720p',this)"><div class="left">720p (HD)</div><div class="radio"></div></div>
  <div class="sheet-opt" onclick="pickQuality('480p','480p',this)"><div class="left">480p</div><div class="radio"></div></div>
</div>

<!-- ═══ SETTINGS SHEET ═══ -->
<div class="sheet" id="sheet-settings">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Настройки</div>
  <div class="settings-card">
    <div class="settings-row"><span>Папка сохранения</span><span class="val" id="settingsPath"></span></div>
    <div class="settings-row"><span>Формат по умолчанию</span><span class="val">mp4</span></div>
    <div class="settings-row"><span>Версия приложения</span><span class="val" id="settingsVersion">2.1.0</span></div>
  </div>
  <button class="update-btn" onclick="checkUpdate()">🔄 Проверить обновление</button>
  <div id="updateStatus"></div>
  <div class="version-info">YTDow v2.1.0 · Android</div>
</div>

<!-- ═══ HIDDEN SELECTS (for bridge compat) ═══ -->
<select id="formatSelect" style="display:none"><option value="mp4">mp4</option><option value="mp3">mp3</option></select>
<select id="qualitySelect" style="display:none"><option value="best">best</option><option value="2160p">2160p</option><option value="1440p">1440p</option><option value="1080p">1080p</option><option value="720p">720p</option><option value="480p">480p</option></select>
<select id="langSelect" style="display:none"><option value="">🎙 Авто</option></select>

<!-- ═══ BOTTOM NAV ═══ -->
<div class="bottom-nav">
  <button class="tab-btn active" onclick="switchTab('home')" id="tabHome">
    <svg viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>Главная
  </button>
  <button class="tab-btn" onclick="switchTab('library')" id="tabLibrary">
    <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="8" y1="2" x2="8" y2="22"></line><line x1="16" y1="2" x2="16" y2="22"></line><line x1="2" y1="8" x2="22" y2="8"></line><line x1="2" y1="16" x2="22" y2="16"></line></svg>Библиотека
  </button>
</div>

<div id="toast" class="toast"></div>

<!-- ═══ ALL JS — PRESERVED ═══ -->
<script>
let tasks={},downloadDir='',history=[],downloadHistory=[];

document.addEventListener('DOMContentLoaded',()=>{
  downloadDir=Android.getDownloadDir();updatePathLabel();
  try{history=JSON.parse(Android.getHistory())}catch(e){history=[]}
  try{downloadHistory=JSON.parse(Android.getDownloadHistory()).reverse()}catch(e){downloadHistory=[]}
  renderLibrary();
  const inp=document.getElementById('urlInput');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')startDownload()});
  inp.addEventListener('input',onUrlInput);
  inp.addEventListener('focus',onUrlFocus);
  inp.addEventListener('blur',()=>setTimeout(()=>document.getElementById('historyList').classList.remove('show'),200));
});

// ── Sheets ──
function openSheet(type){
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet-'+type).classList.add('show');
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('show'));
}
function pickFormat(val,label,el){
  document.getElementById('formatSelect').value=val;
  document.getElementById('format-text').textContent=label;
  document.querySelectorAll('#sheet-format .sheet-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  closeSheet();
}
function pickQuality(val,label,el){
  document.getElementById('qualitySelect').value=val;
  document.getElementById('quality-text').textContent=label;
  document.querySelectorAll('#sheet-quality .sheet-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  closeSheet();
}

function switchTab(tab){
  document.getElementById('pageHome').classList.toggle('active',tab==='home');
  document.getElementById('pageLibrary').classList.toggle('active',tab==='library');
  document.getElementById('tabHome').classList.toggle('active',tab==='home');
  document.getElementById('tabLibrary').classList.toggle('active',tab==='library');
  if(tab==='library'){refreshHistory();renderLibrary()}
}

function onUrlFocus(){if(history.length)showHistoryDropdown()}
function onUrlInput(){if(!document.getElementById('urlInput').value)showHistoryDropdown();else document.getElementById('historyList').classList.remove('show')}
function showHistoryDropdown(){
  const h=document.getElementById('historyList');
  if(!history.length){h.classList.remove('show');return}
  h.innerHTML=history.slice().reverse().map(u=>'<div class="history-item" onclick="selectHistory(\''+esc(u)+'\')">'+esc(u)+'</div>').join('');
  h.classList.add('show');
}
function selectHistory(url){document.getElementById('urlInput').value=url;document.getElementById('historyList').classList.remove('show')}
function updatePathLabel(){var sp=document.getElementById('settingsPath');if(sp)sp.textContent=shortenPath(downloadDir)}

function startDownload(){
  const raw=document.getElementById('urlInput').value.trim();
  if(!raw)return toast('Вставьте ссылку');
  const urls=raw.split(',').map(u=>u.trim()).filter(u=>u.startsWith('http'));
  if(!urls.length)return toast('Нет ссылок');
  const fmt=document.getElementById('formatSelect').value;
  const qual=document.getElementById('qualitySelect').value;
  const lang=document.getElementById('langSelect').value;
  urls.forEach(url=>{
    const nativeTaskId=Android.startDownload(url,fmt,qual,lang);
    tasks[nativeTaskId]={id:nativeTaskId,url,fmt,qual,lang,title:'Ожидание...',status:'queued',percent:0,speed:'',eta:'',filePath:''};
  });
  document.getElementById('urlInput').value='';
  renderTasks();
}
function checkSize(){
  const raw=document.getElementById('urlInput').value.trim();
  if(!raw)return toast('Вставьте ссылку');
  const url=raw.split(',').map(u=>u.trim()).find(u=>u.startsWith('http'));
  if(!url)return toast('Нет ссылки');
  const fmt=document.getElementById('formatSelect').value;
  const qual=document.getElementById('qualitySelect').value;
  const lang=document.getElementById('langSelect').value;
  var st=document.getElementById('sizeText');if(st)st.textContent='Подсчёт...';
  Android.checkSize(url,fmt,qual,lang);
}
function sizeTargetLabel(data){
  const fmtLabel=data.format==='mp3'?'mp3 (аудио)':data.format;
  const qualityLabel=data.quality?data.quality:'best';
  return fmtLabel+' / '+qualityLabel;
}
function onSizeResult(payload){
  try{
    const data=JSON.parse(payload);
    const target=sizeTargetLabel(data);
    var st=document.getElementById('sizeText');
    if(!data.sizeBytes){if(st)st.textContent='—';return}
    const mb=(data.sizeBytes/1024/1024).toFixed(1);
    if(st)st.textContent='~ '+mb+' MB';
  }catch(e){var st2=document.getElementById('sizeText');if(st2)st2.textContent='—'}
}
function onSizeError(message){var st=document.getElementById('sizeText');if(st)st.textContent='—'}
function cancelDownload(tid){Android.cancelDownload(tid);tasks[tid].status='cancelled';renderTasks()}
function changePath(){toast('Загрузки публикуются в Downloads/YTDow')}

function onProgress(taskId,pct,spd,eta){
  if(!tasks[taskId])tasks[taskId]={id:taskId,status:'downloading',percent:pct,speed:spd||'',eta:eta||'',title:'',url:'',fmt:'',qual:'',filePath:''};
  tasks[taskId].status='downloading';
  tasks[taskId].percent=pct;
  if(spd)tasks[taskId].speed=spd;
  if(eta)tasks[taskId].eta=eta;
  renderTasks();
}
function onComplete(taskId,fp){
  if(!tasks[taskId])tasks[taskId]={id:taskId,status:'completed',percent:100,filePath:fp||'',title:'',url:'',fmt:'',qual:'',speed:'',eta:''};
  tasks[taskId].status='completed';
  tasks[taskId].percent=100;
  if(fp)tasks[taskId].filePath=fp;
  renderTasks();
  refreshHistory();
  renderLibrary();
}
function onError(taskId,err){
  if(!tasks[taskId])tasks[taskId]={id:taskId,status:'error',error:err||'',title:'',url:'',fmt:'',qual:'',percent:0,speed:'',eta:'',filePath:''};
  tasks[taskId].status='error';
  tasks[taskId].error=err||'';
  renderTasks();
}

function refreshHistory(){try{downloadHistory=JSON.parse(Android.getDownloadHistory()).reverse()}catch(e){downloadHistory=[]}}
function onHistoryChanged(){refreshHistory();renderTasks();renderLibrary()}

function renderTasks(){
  const c=document.getElementById('taskList'),ids=Object.keys(tasks);
  if(!ids.length){c.innerHTML='<div class="empty">Нет активных загрузок</div>';return}
  let h='';ids.reverse().forEach(id=>{
    const t=tasks[id];
    const fmtLabel=t.fmt==='mp3'?'mp3':(t.fmt||'mp4');
    const qualLabel=t.qual||'best';
    h+='<div class="task-card">';
    if(t.status==='downloading'){
      const pct=t.percent||0, ind=pct<0;
      h+='<div class="task-header">';
      h+='<div class="task-icon-wrap '+(t.fmt==='mp3'?'audio':'video')+'"><svg viewBox="0 0 24 24">'+(t.fmt==='mp3'?'<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>':'<polygon points="5 3 19 12 5 21 5 3"></polygon>')+'</svg></div>';
      h+='<div class="task-info"><div class="task-title">'+esc(t.title||'Загрузка...')+'</div><div class="task-meta">'+fmtLabel+' · '+qualLabel+'</div></div>';
      h+='<div class="cancel-circle" onclick="cancelDownload(\''+id+'\')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>';
      h+='</div>';
      h+='<div class="task-status-row"><span class="pct">'+(ind?'Загрузка...':pct+'%')+'</span><span class="eta">'+(t.speed?t.speed+' ':'')+(t.eta?'~ '+t.eta:'')+'</span></div>';
      h+='<div class="track"><div class="fill'+(ind?' indeterminate':'')+'" style="width:'+(ind?100:pct)+'%"></div></div>';
    }else if(t.status==='completed'){
      h+='<div class="task-header">';
      h+='<div class="task-icon-wrap '+(t.fmt==='mp3'?'audio':'video')+'"><svg viewBox="0 0 24 24">'+(t.fmt==='mp3'?'<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>':'<polygon points="5 3 19 12 5 21 5 3"></polygon>')+'</svg></div>';
      h+='<div class="task-info"><div class="task-title">'+esc(t.title||t.url||'')+'</div><div class="task-meta">'+fmtLabel+' · '+qualLabel+'</div></div>';
      h+='</div>';
      h+='<div class="task-status-done">✓ Готово</div>';
      h+='<div class="track"><div class="fill" style="width:100%"></div></div>';
      h+='<div class="task-actions"><button class="act" onclick="openFile(\''+id+'\')">▶ Открыть</button><button class="act" onclick="openTaskFolder(\''+id+'\')">📂 Папка</button></div>';
    }else if(t.status==='cancelled'){
      h+='<div class="task-title">'+esc(t.title||t.url||'')+'</div><div class="task-cancelled">✗ Отменено</div>';
    }else if(t.status==='error'){
      h+='<div class="task-title">'+esc(t.title||t.url||'')+'</div><div class="task-error">⚠ '+esc(t.error||'Ошибка')+'</div><div class="task-actions"><button class="act" onclick="retryDownload(\''+id+'\')">🔄 Повтор</button></div>';
    }else{
      h+='<div class="task-title">'+esc(t.title||t.url||'')+'</div><div style="color:var(--t2);font-size:13px">В очереди...</div>';
    }
    h+='</div>';
  });
  c.innerHTML=h;
}

function renderLibrary(){
  const c=document.getElementById('libraryDownloads');
  if(!downloadHistory.length){c.innerHTML='<div class="empty">Пусто</div>';return}
  let h='';downloadHistory.forEach((e,i)=>{
    let entry=e;
    if(typeof e==='string'){try{entry=JSON.parse(e)}catch(_){}}
    if(!entry||!entry.url)return;
    h+='<div class="lib-item"><div class="lib-header"><div class="lib-thumb">▶️</div><div class="lib-info"><div class="lib-title">'+esc(entry.title||entry.url)+'</div><div class="lib-meta"><span>'+(entry.format||'mp4')+'</span>·<span>'+(entry.quality||'best')+'</span>·<span>'+timeAgo(entry.time)+'</span></div></div></div><div class="lib-actions">';
    if(entry.filePath)h+='<button class="act" onclick="openHistoryFile('+i+')">▶ Открыть</button>';
    if(entry.filePath)h+='<button class="act" onclick="openHistoryFolder('+i+')">📂 Папка</button>';
    h+='<button class="act" onclick="deleteHistoryFile('+i+')">🗑 Удалить</button>';
    h+='</div></div>';
  });
  c.innerHTML=h;
}

function checkUpdate(){document.getElementById('updateStatus').innerHTML='Проверка...';Android.checkUpdate()}
function onUpdateResult(resultStr){
  try{
    const r=JSON.parse(resultStr);
    if(r.error){document.getElementById('updateStatus').textContent='⚠ '+r.error;return}
    const current=r.current||'1.0.0',latest=r.latest||'?',downloadUrl=r.downloadUrl||'';
    if(latest===current||!latest||latest==='?'){document.getElementById('updateStatus').innerHTML='✓ У вас последняя версия ('+current+')'}
    else if(downloadUrl){document.getElementById('updateStatus').innerHTML='🆕 Доступна v'+latest+' <button class="act" style="background:var(--accent);color:#fff;border-radius:6px;padding:4px 10px" onclick="downloadUpdate(\''+esc(downloadUrl)+'\')">⬇ Скачать</button>'}
    else{document.getElementById('updateStatus').textContent='🆕 Доступна v'+latest+' (нет APK)'}
  }catch(e){document.getElementById('updateStatus').textContent='⚠ Ошибка'}
}
function downloadUpdate(url){document.getElementById('updateStatus').innerHTML='Скачивание... <span id="dlPct">0%</span>';Android.downloadUpdate(url)}
function onUpdateProgress(pct){const el=document.getElementById('dlPct');if(el)el.textContent=pct+'%'}

function historyEntry(i){let e=downloadHistory[i];if(typeof e==='string'){try{e=JSON.parse(e)}catch(_){return null}}return e||null}
function openFile(tid){const t=tasks[tid];if(t&&t.filePath)Android.openFile(t.filePath);else toast('Файл не найден')}
function openTaskFolder(tid){const t=tasks[tid];if(t&&t.filePath)Android.openFolder(folderFromPath(t.filePath));else Android.openFolder(downloadDir)}
function openHistoryFile(i){const e=historyEntry(i);if(e&&e.filePath)Android.openFile(e.filePath);else toast('Файл не найден')}
function openHistoryFolder(i){const e=historyEntry(i);if(e&&e.filePath)Android.openFolder(folderFromPath(e.filePath));else toast('Папка не найдена')}
function deleteHistoryFile(i){const e=historyEntry(i);if(!e||!e.filePath)return;if(confirm('Удалить файл?')){Android.deleteFile(e.filePath);toast('Файл удалён');deleteFromTasks(e.filePath);refreshHistory();renderTasks();renderLibrary()}}
function deleteFromTasks(filePath){Object.keys(tasks).forEach(id=>{if(tasks[id]&&tasks[id].filePath===filePath)delete tasks[id]})}
function folderFromPath(filePath){const idx=filePath.lastIndexOf('/');return idx>0?filePath.slice(0,idx):downloadDir}
function retryDownload(tid){const t=tasks[tid];if(!t)return;const nativeTaskId=Android.startDownload(t.url,t.fmt,t.qual,t.lang||'');tasks[nativeTaskId]={...t,id:nativeTaskId,status:'queued',percent:0,error:null};delete tasks[tid];renderTasks()}
function esc(s){const d=document.createElement('div');d.textContent=(s||'');return d.innerHTML}
function shortenPath(p){const parts=p.split('/');return parts.length>3?'.../'+parts.slice(-2).join('/'):p}
function toggleSection(id){const el=document.getElementById(id),arrow=document.getElementById('libArrow');if(el.style.display==='none'){el.style.display='block';arrow.textContent='▼'}else{el.style.display='none';arrow.textContent='▶'}}
function deleteFile(filePath){if(!filePath)return;if(confirm('Удалить файл?')){Android.deleteFile(filePath);toast('Файл удалён');deleteFromTasks(filePath);refreshHistory();renderTasks();renderLibrary()}}
function timeAgo(ts){if(!ts)return'';const s=(Date.now()-ts)/1000;if(s<60)return'только что';if(s<3600)return Math.floor(s/60)+'м';if(s<86400)return Math.floor(s/3600)+'ч';return Math.floor(s/86400)+'д'}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500)}
</script>
</body>
</html>
